services:

  api:
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
    container_name: mediahub_api
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - ./.env.prod:/env/.env:ro
      - ./docker/php-fpm/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/php-fpm/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mediahub_network
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: mediahub_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
      - "127.0.0.1:8082:8080"
    volumes:
      - ./frontend:/var/www/frontend
      - ./backend:/var/www/backend
      - ./docker/nginx/conf.d/default.prod.conf:/etc/nginx/conf.d/default.conf
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mediahub_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: mediahub_postgres
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - mediahub_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mediahub_redis
    restart: unless-stopped
    env_file:
      - ./.env.prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - mediahub_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  mediahub_network:
    driver: bridge

volumes:
  nginx_logs:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local