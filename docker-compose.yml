services:

  app:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: mediahub_app
    restart: unless-stopped
    working_dir: /var/www/frontend
    volumes:
      - ./frontend:/var/www/frontend
    ports:
      - "127.0.0.1:5174:5174"
    healthcheck:
      disable: true
    networks:
      - mediahub_network
    profiles:
      - dev

  api:
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
      args:
        - ENABLE_XDEBUG=${ENABLE_XDEBUG:-true}
    container_name: mediahub_api
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - ./.env:/env/.env:ro
      - ./docker/php-fpm/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/php-fpm/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    env_file:
      - ./.env
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - XDEBUG_MODE=${XDEBUG_MODE:-debug}
      - XDEBUG_CONFIG=client_host=host.docker.internal
      - PHP_IDE_CONFIG=serverName=Docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mediahub_network
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - dev
      - prod

  # Nginx for development
  nginx_dev:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: mediahub_nginx_dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"    # frontend
      - "127.0.0.1:8082:8080"  # backend
    volumes:
      - ./frontend:/var/www/frontend
      - ./backend:/var/www/backend
      - ./docker/nginx/conf.d/default.dev.conf:/etc/nginx/conf.d/default.conf
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        condition: service_started
      api:
        condition: service_healthy
    networks:
      - mediahub_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - dev

  # Nginx for production
  nginx_prod:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: mediahub_nginx_prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./frontend:/var/www/frontend
      - ./backend:/var/www/backend
      - ./docker/nginx/conf.d/default.prod.conf:/etc/nginx/conf.d/default.conf
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mediahub_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - prod

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: mediahub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - mediahub_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - dev
      - prod

  # Redis for caching, sessions and queues
  redis:
    image: redis:7-alpine
    container_name: mediahub_redis
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - mediahub_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - dev
      - prod

  # Queue for background jobs
  # queue:
  #   build:
  #     context: .
  #     dockerfile: docker/php-fpm/Dockerfile
  #   container_name: mediahub_queue
  #   working_dir: /var/www
  #   command: php artisan queue:work redis --queue=default,emails --tries=3 --timeout=90
  #   restart: unless-stopped
  #   volumes:
  #     - ./backend:/var/www
  #   env_file:
  #     - ./backend/.env
  #   environment:
  #     - QUEUE_CONNECTION=redis
  #     - REDIS_HOST=redis
  #     - REDIS_PASSWORD=${REDIS_PASSWORD}
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - mediahub_network
  #   profiles:
  #   - dev
  #   - prod

networks:
  mediahub_network:
    driver: bridge

volumes:
  nginx_logs:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local