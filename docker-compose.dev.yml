services:

  app:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: mediahub_app
    restart: unless-stopped
    working_dir: /var/www/frontend
    volumes:
      - ./frontend:/var/www/frontend
    ports:
      - "127.0.0.1:5174:5174"
    healthcheck:
      disable: true
    networks:
      - mediahub_network

  api:
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
      args:
        - ENABLE_XDEBUG=${ENABLE_XDEBUG:-true}
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - ./.env.dev:/env/.env:ro

  nginx:
    ports:
      - "127.0.0.1:8081:80"
      - "127.0.0.1:8082:8080"
    volumes:
      - ./docker/nginx/conf.d/default.dev.conf:/etc/nginx/conf.d/default.conf

  postgres:
    env_file:
      - ./.env.dev

  redis:
    env_file:
      - ./.env.dev