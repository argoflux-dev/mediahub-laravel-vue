# ------------------------------
# Frontend - Production
# ------------------------------
server {
    listen 80;
    server_name mediahub.argoflux.com;

    # Root for production front-end assembly
    root /var/www/frontend/dist;
    index index.html;

    charset utf-8;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Logs
    access_log /var/log/nginx/mediahub_access.log;
    error_log /var/log/nginx/mediahub_error.log warn;

    client_max_body_size 50M;
    client_body_timeout 300s;

    # Main frontend route
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Статика продакшн фронта (build, dist)
    location /dist/ {
        alias /var/www/frontend/dist/;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # favicon & robots
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt { access_log off; log_not_found off; }

    # Healthcheck для Docker
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# ------------------------------
# Backend - PHP-FPM
# ------------------------------
server {
    listen 80;
    server_name api.mediahub.argoflux.com;

    root /var/www/public;
    index index.php;

    charset utf-8;

    access_log /var/log/nginx/api_access.log;
    error_log /var/log/nginx/api_error.log warn;

    client_max_body_size 50M;
    client_body_timeout 300s;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass api:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/public$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS off;

        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 300;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
    }

    # Deny hidden and sensitive files
    location ~ /\. { deny all; access_log off; log_not_found off; }
    location ~* (composer.json|composer.lock|package.json|package-lock.json|\.env.*|\.git)$ {
        deny all; access_log off; log_not_found off;
    }

    # Healthcheck
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}